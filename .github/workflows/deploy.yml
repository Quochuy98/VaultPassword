# Deploy Vite + React to GitHub Pages
# Repo: https://github.com/Quochuy98/VaultPassword
# Custom domain at root (e.g. p.quochuy.me): VITE_BASE_PATH=/ — open https://p.quochuy.me/ (not /VaultPassword/).
# GitHub project Pages only: set VITE_BASE_PATH: /VaultPassword/ in the Build step env instead.
# No repo URL is required in this file — runs in the repository that contains it.

name: Deploy React App to Pages

on:
    push:
        branches: ["deploy"]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: false

jobs:
    build_and_deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Build project (Vite → dist)
              env:
                  VITE_BASE_PATH: "/"
              run: npm run build

            - name: SPA fallback for GitHub Pages
              run: cp dist/index.html dist/404.html

            - name: Setup Pages
              uses: actions/configure-pages@v4

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: "./dist"

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
